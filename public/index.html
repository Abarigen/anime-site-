<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID CARD Store</title>
    <meta
      name="description"
      content="Інтернет-магазин колекційних ID-карток з каталогом, акційними наборами, кошиком і кабінетом керування."
    />
    <link rel="stylesheet" href="/styles.css?v=28" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/catalog" data-link data-reset-cart-flow aria-label="ID CARD Store">
        <span class="brand-mark">ID</span>
        <span>CARD Store</span>
      </a>
      <nav class="top-nav" aria-label="Головна навігація">
        <a href="/catalog" data-link>Каталог</a>
        <a href="/login" data-link>Увійти</a>
        <a href="/cart" data-link>Кошик <span id="cart-count">0</span></a>
      </nav>
    </header>

    <main id="app" class="app-shell" aria-live="polite"></main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="modal hidden" id="order-modal" role="dialog" aria-modal="true" aria-labelledby="order-modal-title">
      <div class="modal-card">
        <p class="tiny">Замовлення</p>
        <h2 id="order-modal-title">Замовлення прийнято</h2>
        <p id="order-modal-text">
          Замовлення прийнято в роботу. Наш менеджер найближчим часом зв'яжеться для підтвердження.
        </p>
        <p class="order-number" id="order-modal-number"></p>
        <button class="button dark wide" type="button" data-modal-catalog>Повернутися в каталог</button>
      </div>
    </div>
    <script src="/app.js?v=28" type="module"></script>
  </body>
</html>
